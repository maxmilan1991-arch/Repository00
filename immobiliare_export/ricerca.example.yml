# --------------------------------------------------------------------------
# immobiliare-export — example configuration
#
# How to obtain a `url`:
#   1. Open https://www.immobiliare.it in your browser.
#   2. Apply your filters visually (Comune, Provincia, Regione, prezzo,
#      superficie, "Da ristrutturare", ecc.).
#   3. Copy the URL from the address bar.
#   4. Paste it in the `url` field below.
#
# Anything in `params` is appended to the query string as-is, so you can
# either bake the filter into the URL (browser-driven) or describe it
# here (config-driven). The site-recognized parameters most commonly
# useful are:
#     prezzoMinimo / prezzoMassimo
#     superficieMinima / superficieMassima
#     criterio=dataannuncio + ordine=desc        # sort by recent
#     criterio=prezzo       + ordine=asc         # sort by price asc
# --------------------------------------------------------------------------

output_dir: ./out
delay_between_pages_sec: 2
max_pages_per_search: 100
fetch_full_description: false
headless: true
consecutive_known_to_stop: 25     # full page of "already known" → stop
runs_missed_before_stale: 3       # missed for N runs → status="non più disponibile"

# Antibot fallback: drive a real Chrome over CDP instead of letting
# Playwright launch its own bundled Chromium. Use this if you keep
# getting 403 from immobiliare.it even with playwright-stealth on.
# See README → "Modalità CDP / Chrome reale" for the exact steps.
connect_to_existing_browser: false
cdp_endpoint: http://localhost:9222

searches:
  # Whole-city search
  - nome: "Milano - tutta la città"
    url: https://www.immobiliare.it/vendita-case/milano/
    params:
      prezzoMassimo: 5000000
      superficieMinima: 80

  # Province-wide search
  - nome: "Lago di Como - rive est"
    url: https://www.immobiliare.it/vendita-case/lecco-provincia/
    params:
      prezzoMassimo: 1500000

  # Regional search, with a vertical (rustici/casali)
  - nome: "Rustici Toscana"
    url: https://www.immobiliare.it/vendita-rustici-casali/toscana/
    params:
      superficieMinima: 200
      prezzoMassimo: 800000
